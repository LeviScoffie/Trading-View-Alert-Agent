version: '3.8'

# Shared named volume — all services share the same SQLite databases:
#   /app/data/alerts.db     (webhook-receiver writes; email-notifier reads)
#   /app/data/ohlcv.db      (analysis_bridge.py writes; email-notifier reads)
#   /data/scheduler.db      (scheduler writes; mounted at /data not /app/data)
#
# Note: analysis-engine is NOT a separate container — it runs as an embedded
# library inside webhook-receiver via analysis_bridge.py + alert_processor.py
volumes:
  tv_data:

networks:
  tv-agent-network:
    driver: bridge

services:

  # ── Layer 1: Webhook Receiver ──────────────────────────────────────────────
  webhook-receiver:
    build:
      context: ./webhook-receiver
      dockerfile: Dockerfile
    container_name: tv-webhook-receiver
    ports:
      - "8000:8000"
    volumes:
      - tv_data:/app/data
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      DATABASE_PATH: "/app/data/alerts.db"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      CONFIDENCE_THRESHOLD: "${CONFIDENCE_THRESHOLD:-0.75}"
      # Analysis engine OHLCV DB path (shared volume)
      EMAIL_NOTIFIER_OHLCV_DB_PATH: "/app/data/ohlcv.db"
      # SMTP — forwarded to alert_processor → email_notifier
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      EMAIL_FROM: "${EMAIL_FROM}"
      EMAIL_TO: "${EMAIL_TO}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tv-agent-network

  # ── Layer 3: Email Notifier (scheduled reports, triggered via HTTP) ──────────
  email-notifier:
    build:
      context: ./email-notifier
      dockerfile: Dockerfile
    container_name: tv-email-notifier
    ports:
      - "8001:8001"
    volumes:
      - tv_data:/app/data
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # Point at the shared databases
      EMAIL_NOTIFIER_DB_PATH: "/app/data/alerts.db"
      EMAIL_NOTIFIER_OHLCV_DB_PATH: "/app/data/ohlcv.db"
      # SMTP
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      EMAIL_FROM: "${EMAIL_FROM}"
      EMAIL_TO: "${EMAIL_TO}"
      # Schedule (defaults: daily 17:00, weekly Sunday 17:00, monthly last-day 17:00)
      DAILY_REPORT_HOUR: "${DAILY_REPORT_HOUR:-17}"
      WEEKLY_REPORT_HOUR: "${WEEKLY_REPORT_HOUR:-17}"
      MONTHLY_REPORT_HOUR: "${MONTHLY_REPORT_HOUR:-17}"
      SCHEDULE_TIMEZONE: "${SCHEDULE_TIMEZONE:-America/New_York}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tv-agent-network

  # ── Scheduler (orchestrates report timing + maintenance) ───────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: tv-scheduler
    ports:
      - "8003:8003"
    volumes:
      - tv_data:/data
    environment:
      SCHEDULER_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      SCHEDULER_API_HOST: "0.0.0.0"
      SCHEDULER_API_PORT: "8003"
      SCHEDULER_DB_PATH: "/data/scheduler.db"
      ALERTS_DB_PATH: "/data/alerts.db"
      WEBHOOK_RECEIVER_URL: "http://webhook-receiver:8000"
      EMAIL_NOTIFIER_URL: "http://email-notifier:8001"
      SCHEDULE_TIMEZONE: "${SCHEDULE_TIMEZONE:-America/New_York}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - webhook-receiver
      - email-notifier
    networks:
      - tv-agent-network
